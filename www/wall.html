<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KFC MAN-WALL - 실시간 협업 알림 보드</title>
  <!-- Google Fonts: Outfit -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            title: ['Outfit', 'Noto Sans KR', 'sans-serif'],
            sans: ['Noto Sans KR', 'sans-serif'],
          },
          colors: {
            clay: {
              card: '#ffffff',
              night: '#0c0f17',
              cardDark: '#131824',
              purple: '#8b5cf6',
              sky: '#06b6d4',
              mint: '#10b981',
              grass: '#84cc16',
              toy: '#f59e0b',
              sand: '#f8fafc',
            }
          },
          boxShadow: {
            'clay-flat': '4px 4px 0px 0px rgba(167, 139, 250, 0.45)',
            'clay-flat-lg': '8px 8px 0px 0px rgba(167, 139, 250, 0.35)',
            'clay-flat-sm': '2px 2px 0px 0px rgba(167, 139, 250, 0.55)',
          }
        }
      }
    }
  </script>
  
  <style>
    html {
      font-size: 21.33px; /* 16pt on desktop */
    }
    @media (max-width: 768px) {
      html {
        font-size: 16px; /* 12pt on mobile */
      }
    }
    body {
      background-color: #f1f5f9;
      transition: background-color 0.3s ease;
    }
    .dark body {
      background-color: #0c0f17;
    }
    /* Pastel card backgrounds */
    .bg-pastel-pink { background-color: #ffe4e6; border-color: #fecdd3; color: #4c0519; }
    .bg-pastel-yellow { background-color: #fef9c3; border-color: #fef08a; color: #422006; }
    .bg-pastel-blue { background-color: #e0f2fe; border-color: #bae6fd; color: #0c4a6e; }
    .bg-pastel-green { background-color: #dcfce7; border-color: #bbf7d0; color: #064e3b; }
    .bg-pastel-purple { background-color: #f3e8ff; border-color: #e9d5ff; color: #3b0764; }
    
    /* Dark mode pastel card overrides for text readability */
    .dark .bg-pastel-pink { background-color: #4c0519; border-color: #9f1239; color: #ffe4e6; }
    .dark .bg-pastel-yellow { background-color: #422006; border-color: #854d0e; color: #fef9c3; }
    .dark .bg-pastel-blue { background-color: #0c4a6e; border-color: #075985; color: #e0f2fe; }
    .dark .bg-pastel-green { background-color: #064e3b; border-color: #166534; color: #dcfce7; }
    .dark .bg-pastel-purple { background-color: #3b0764; border-color: #6b21a8; color: #f3e8ff; }

    .clay-card {
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .clay-card:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0px 0px rgba(167, 139, 250, 0.55);
    }
    
    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    .dark ::-webkit-scrollbar-thumb {
      background: #334155;
    }
  </style>
</head>
<body class="font-sans antialiased text-slate-800 dark:text-slate-100 min-h-screen pb-12 transition-colors duration-200">

  <!-- Header -->
  <header class="h-20 flex items-center border-b-4 border-white bg-white dark:bg-clay-night sticky top-0 z-50 transition-colors shadow-sm px-4 md:px-0">
    <div class="max-w-7xl mx-auto px-4 md:px-6 w-full flex justify-between items-center">
      
      <!-- Brand Logo & Back -->
      <div class="flex items-center gap-3">
        <a href="/" class="w-10 h-10 rounded-xl border-2 border-slate-900 bg-slate-50 dark:bg-slate-800 dark:border-white flex items-center justify-center shadow-clay-flat-sm text-slate-800 dark:text-white hover:translate-x-0.5 hover:translate-y-0.5 transition-all">
          <i data-lucide="arrow-left" class="w-5 h-5"></i>
        </a>
        <a href="/wall" class="font-title text-2xl font-black tracking-tight flex items-center gap-0.5 select-none">
          <span class="text-slate-900 dark:text-white">KFC</span>
          <span class="bg-gradient-to-r from-clay-purple to-clay-sky text-transparent bg-clip-text font-extrabold">MAN</span>
          <span class="text-clay-grass font-black">.</span>
          <span class="bg-gradient-to-r from-clay-sky to-clay-mint text-transparent bg-clip-text font-black">WALL</span>
        </a>
      </div>

      <!-- Dark Mode Switcher -->
      <button onclick="document.documentElement.classList.toggle('dark'); localStorage.setItem('darkMode', document.documentElement.classList.contains('dark') ? 'enabled' : 'disabled')" class="w-10 h-10 rounded-xl border-2 border-slate-900 dark:border-white bg-slate-50 dark:bg-slate-800 flex items-center justify-center shadow-clay-flat-sm text-slate-800 dark:text-white hover:translate-x-0.5 hover:translate-y-0.5 transition-all">
        <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
        <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
      </button>

    </div>
  </header>

  <!-- Main Container -->
  <main class="max-w-7xl mx-auto px-4 md:px-6 mt-8">
    
    <!-- 1. Landing Screen (If no active board) -->
    <div id="landing-screen" class="max-w-md mx-auto space-y-6 mt-12 hidden">
      <!-- Creatio      <div class="bg-white dark:bg-clay-cardDark border-4 border-violet-200 dark:border-slate-800 rounded-3xl p-6 md:p-8 shadow-clay-flat-lg text-center">
        <div class="w-16 h-16 rounded-2xl border-2 border-violet-200 dark:border-slate-700 bg-clay-purple text-white flex items-center justify-center mx-auto mb-6 shadow-clay-flat">
          <i data-lucide="layout-grid" class="w-8 h-8"></i>
        </div>
        
        <h2 class="text-3xl font-black mb-2 flex items-center justify-center gap-0.5 select-none font-title">
          <span class="text-slate-900 dark:text-white">실시간 협업</span>
          <span class="bg-gradient-to-r from-clay-purple to-clay-sky text-transparent bg-clip-text font-extrabold">게시판</span>
          <span class="text-clay-grass font-black">.</span>
          <span class="bg-gradient-to-r from-clay-sky to-clay-mint text-transparent bg-clip-text font-black">만들기</span>
        </h2>
        <p class="text-xs font-bold text-slate-400 dark:text-slate-500 mb-6">학생들이 실시간으로 생각, 피드백, 응원을 공유하는 교실 전용 게시판 공간을 만듭니다.</p>
        
        <form id="create-wall-form" class="space-y-4 text-left">
          <div class="space-y-1.5">
            <label class="text-xs font-black text-slate-500 dark:text-slate-400">게시판 제목 (주제)</label>
            <input type="text" id="wall-title-input" placeholder="예: 우리 반 한 줄 피드백 / 수행평가 의견 나눔" required class="w-full bg-slate-50 dark:bg-slate-950 border-2 border-violet-200 dark:border-slate-800 rounded-xl px-4 py-3 text-sm font-bold text-slate-800 dark:text-white focus:outline-none">
          </div>
          <div class="space-y-1.5">
            <label class="text-xs font-black text-slate-500 dark:text-slate-400">게시판 설명 (안내글)</label>
            <input type="text" id="wall-desc-input" placeholder="예: 서로를 응원하며 자유로운 아이디어를 포스트잇으로 적어주세요." class="w-full bg-slate-50 dark:bg-slate-950 border-2 border-violet-200 dark:border-slate-800 rounded-xl px-4 py-3 text-sm font-bold text-slate-800 dark:text-white focus:outline-none">
          </div>
          <div class="space-y-1.5">
            <label class="text-xs font-black text-slate-500 dark:text-slate-400">접근 허용 인원 (접속 제한)</label>
            <input type="number" id="wall-max-users-input" min="0" placeholder="무제한 (0)" class="w-full bg-slate-50 dark:bg-slate-950 border-2 border-violet-200 dark:border-slate-800 rounded-xl px-4 py-3 text-sm font-bold text-slate-800 dark:text-white focus:outline-none">
          </div>
          <div class="space-y-1.5">
            <label class="text-xs font-black text-slate-500 dark:text-slate-400">게시판 레이아웃 형식</label>
            <div class="grid grid-cols-2 gap-3 mt-1">
              <!-- Grid Layout option -->
              <label class="cursor-pointer">
                <input type="radio" name="wall-layout-picker" value="grid" checked class="hidden peer">
                <div class="p-3 rounded-2xl bg-slate-50 dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-800 peer-checked:border-clay-purple peer-checked:bg-violet-50/30 dark:peer-checked:bg-violet-950/15 peer-checked:shadow-clay-flat-sm transition-all text-left h-full flex flex-col justify-between">
                  <div>
                    <div class="flex items-center gap-2 mb-1">
                      <div class="w-6 h-6 rounded-lg bg-violet-100 dark:bg-violet-950 flex items-center justify-center text-clay-purple">
                        <i data-lucide="layout-grid" class="w-3.5 h-3.5"></i>
                      </div>
                      <span class="text-xs font-black text-slate-800 dark:text-slate-100">그리드 담벼락형</span>
                    </div>
                    <span class="text-[9px] font-bold text-slate-400 dark:text-slate-500 block leading-relaxed">포스트잇이 자유롭게 바둑판 그리드 배열로 정렬됩니다.</span>
                  </div>
                </div>
              </label>
              <!-- Column Section Layout option -->
              <label class="cursor-pointer">
                <input type="radio" name="wall-layout-picker" value="columns" class="hidden peer">
                <div class="p-3 rounded-2xl bg-slate-50 dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-800 peer-checked:border-clay-sky peer-checked:bg-cyan-50/30 dark:peer-checked:bg-cyan-950/15 peer-checked:shadow-[2px_2px_0px_0px_rgba(6,182,212,0.55)] transition-all text-left h-full flex flex-col justify-between">
                  <div>
                    <div class="flex items-center gap-2 mb-1">
                      <div class="w-6 h-6 rounded-lg bg-cyan-100 dark:bg-cyan-950/50 flex items-center justify-center text-clay-sky">
                        <i data-lucide="columns-3" class="w-3.5 h-3.5"></i>
                      </div>
                      <span class="text-xs font-black text-slate-800 dark:text-slate-100">칸반 컬럼형 (Kanban)</span>
                    </div>
                    <span class="text-[9px] font-bold text-slate-400 dark:text-slate-500 block leading-relaxed">토론 모둠, Kanban 보드 형태로 열을 나누고 카드를 정리합니다.</span>
                  </div>
                </div>
              </label>
              <!-- Row Stream Layout option -->
              <label class="cursor-pointer">
                <input type="radio" name="wall-layout-picker" value="rows" class="hidden peer">
                <div class="p-3 rounded-2xl bg-slate-50 dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-800 peer-checked:border-rose-500 peer-checked:bg-rose-50/30 dark:peer-checked:bg-rose-950/15 peer-checked:shadow-[2px_2px_0px_0px_rgba(244,63,94,0.55)] transition-all text-left h-full flex flex-col justify-between">
                  <div>
                    <div class="flex items-center gap-2 mb-1">
                      <div class="w-6 h-6 rounded-lg bg-rose-100 dark:bg-rose-950/50 flex items-center justify-center text-rose-500">
                        <i data-lucide="list" class="w-3.5 h-3.5"></i>
                      </div>
                      <span class="text-xs font-black text-slate-800 dark:text-slate-100">행(목록)형</span>
                    </div>
                    <span class="text-[9px] font-bold text-slate-400 dark:text-slate-500 block leading-relaxed">포스트잇이 단일 열로 넓게 세로 스택 배열로 정렬됩니다.</span>
                  </div>
                </div>
              </label>
              <!-- Timeline Layout option -->
              <label class="cursor-pointer">
                <input type="radio" name="wall-layout-picker" value="timeline" class="hidden peer">
                <div class="p-3 rounded-2xl bg-slate-50 dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-800 peer-checked:border-amber-500 peer-checked:bg-amber-50/30 dark:peer-checked:bg-amber-950/15 peer-checked:shadow-[2px_2px_0px_0px_rgba(245,158,11,0.55)] transition-all text-left h-full flex flex-col justify-between">
                  <div>
                    <div class="flex items-center gap-2 mb-1">
                      <div class="w-6 h-6 rounded-lg bg-amber-100 dark:bg-amber-950/50 flex items-center justify-center text-amber-500">
                        <i data-lucide="git-commit" class="w-3.5 h-3.5"></i>
                      </div>
                      <span class="text-xs font-black text-slate-800 dark:text-slate-100">타임라인형 (가로)</span>
                    </div>
                    <span class="text-[9px] font-bold text-slate-400 dark:text-slate-500 block leading-relaxed">가로 방향 시간 흐름선에 따라 카드가 순서대로 정렬됩니다.</span>
                  </div>
                </div>
              </label>
            </div>
          </div>
          
          <button type="submit" class="w-full btn py-4 text-sm font-black border-2 border-violet-200 dark:border-slate-700 rounded-2xl bg-clay-purple text-white hover:bg-violet-600 shadow-clay-flat transition-all cursor-pointer flex items-center justify-center gap-2">
            <i data-lucide="plus-circle" class="w-4 h-4"></i>
            <span>실시간 알림 보드 개설하기</span>
          </button>
        </form>
      </div>

      <!-- Right Column: Lists -->
      <div id="my-walls-container" class="space-y-6 hidden">
        <!-- 1. Created Boards -->
        <div id="created-walls-section" class="bg-white dark:bg-clay-cardDark border-4 border-violet-200 dark:border-slate-800 rounded-3xl p-6 shadow-clay-flat-lg text-left hidden">
          <h3 class="text-xs font-black text-slate-800 dark:text-white flex items-center gap-1.5 mb-3">
            <i data-lucide="award" class="text-clay-purple w-4.5 h-4.5"></i>
            내가 생성한 게시판
          </h3>
          <div id="created-walls-list" class="space-y-2.5 max-h-60 overflow-y-auto pr-1">
            <!-- Dynamic board items -->
          </div>
        </div>

        <!-- 2. Visited Boards -->
        <div id="visited-walls-section" class="bg-white dark:bg-clay-cardDark border-4 border-violet-200 dark:border-slate-800 rounded-3xl p-6 shadow-clay-flat-lg text-left hidden">
          <h3 class="text-xs font-black text-slate-800 dark:text-white flex items-center gap-1.5 mb-3">
            <i data-lucide="clock" class="text-clay-sky w-4 h-4"></i>
            최근 방문 게시판
          </h3>
          <div id="visited-walls-list" class="space-y-2.5 max-h-60 overflow-y-auto pr-1">
            <!-- Dynamic board items -->
          </div>
        </div>
      </div>
    </div>

    <!-- 2. Collaborative Board Screen -->
    <div id="board-screen" class="hidden space-y-6">
      
      <!-- Board Header Info Card -->
      <div class="bg-white dark:bg-clay-cardDark border-4 border-violet-200 dark:border-slate-800 rounded-3xl p-6 shadow-clay-flat-lg flex flex-col md:flex-row justify-between items-start md:items-center gap-4 text-left">
        <div>
          <div class="flex flex-wrap items-center gap-2.5">
            <h1 id="board-title" class="text-2xl font-black text-slate-900 dark:text-white">보드 제목</h1>
            <span class="inline-flex items-center gap-1 px-3 py-1 rounded-full bg-emerald-100 dark:bg-emerald-950/50 border border-emerald-300 dark:border-emerald-700 text-[10px] font-black text-emerald-700 dark:text-emerald-400">
              <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-ping"></span>
              <span>실시간 동화됨 (SSE Active)</span>
            </span>
            <span id="visitor-badge" class="inline-flex items-center gap-1 px-3.5 py-1.5 rounded-full bg-violet-100 dark:bg-violet-950/50 border border-violet-300 dark:border-violet-700 text-[16px] font-black text-violet-700 dark:text-violet-400">
              <i data-lucide="users" class="w-4 h-4 text-clay-purple"></i>
              <span>현재 접속자 수: <span id="current-viewer-count">1</span> / <span id="max-viewer-count">무제한</span></span>
            </span>
          </div>
          <p id="board-desc" class="text-xs font-bold text-slate-500 dark:text-slate-400 mt-2">안내글이 표시됩니다.</p>
        </div>
        
        <!-- Board Access Code / Copy Link Button -->
        <div class="flex items-center gap-2">
          <button id="btn-number-login" onclick="toggleNumberLogin()" class="btn px-4 py-3 text-xs font-black border-2 border-amber-200 dark:border-slate-700 rounded-2xl bg-amber-100 hover:bg-amber-200 text-amber-800 dark:bg-slate-800 dark:hover:bg-slate-700 dark:text-amber-400 shadow-clay-flat hover:translate-x-0.5 hover:translate-y-0.5 transition-all flex items-center gap-1.5 cursor-pointer">
            <i data-lucide="user-check" class="w-4 h-4"></i>
            <span id="number-login-text">번호 회원 로그인</span>
          </button>
          <button id="btn-copy-wall-link" class="btn px-4 py-3 text-xs font-black border-2 border-violet-200 dark:border-slate-700 rounded-2xl bg-white dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 shadow-clay-flat hover:translate-x-0.5 hover:translate-y-0.5 transition-all flex items-center gap-1.5 cursor-pointer">
            <i data-lucide="copy" class="w-4 h-4"></i>
            <span>링크 복사</span>
          </button>
          <button id="btn-reset-wall" class="btn px-4 py-3 text-xs font-black border-2 border-rose-200 dark:border-rose-950 rounded-2xl bg-rose-500 hover:bg-rose-600 text-white shadow-clay-flat hover:translate-x-0.5 hover:translate-y-0.5 transition-all flex items-center gap-1.5 cursor-pointer">
            <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
            <span>전체 초기화</span>
          </button>
        </div>
      </div>

      <!-- Real-time Cards Grid -->
      <div id="cards-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        <!-- Dynamic Cards go here -->
      </div>
      
      <!-- Empty state when no cards exist -->
      <div id="empty-cards-state" class="hidden text-center py-16 bg-slate-100/50 dark:bg-slate-900/20 border-4 border-dashed border-slate-300 dark:border-slate-800 rounded-3xl p-8 max-w-lg mx-auto">
        <i data-lucide="sticky-note" class="w-12 h-12 text-slate-400 mx-auto mb-4 animate-bounce"></i>
        <h3 class="text-sm font-black text-slate-600 dark:text-slate-400 mb-1">작성된 카드가 아직 없습니다</h3>
        <p class="text-xs text-slate-400">오른쪽 아래 플로팅 버턴(+)을 눌러 첫 번째 카드를 작성해 보세요!</p>
      </div>

    </div>

  </main>

  <!-- 3. Floating Action Button (FAB) (Only visible in board screen) -->
  <button id="btn-floating-add" class="hidden fixed bottom-6 right-6 w-16 h-16 rounded-full border-4 border-violet-200 dark:border-slate-700 bg-clay-purple text-white flex items-center justify-center shadow-clay-flat-lg hover:shadow-clay-flat hover:translate-x-1 hover:translate-y-1 transition-all z-40 cursor-pointer active:scale-95">
    <i data-lucide="plus" class="w-8 h-8"></i>
  </button>

  <!-- 4. Card Creation Modal Dialog -->
  <div id="card-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white dark:bg-clay-cardDark border-4 border-violet-200 dark:border-slate-800 rounded-3xl max-w-lg w-full p-6 shadow-clay-flat-lg transform transition-all duration-300 scale-95 opacity-0 text-left" id="card-modal-content">
      <div class="flex justify-between items-center border-b-2 border-slate-100 dark:border-slate-800 pb-3 mb-4">
        <h3 class="text-lg font-black text-slate-900 dark:text-white flex items-center gap-1.5"><i data-lucide="edit-3" class="text-clay-purple"></i> 카드 작성하기</h3>
        <button id="btn-close-modal" class="w-8 h-8 rounded-lg border-2 border-slate-300 hover:border-slate-900 dark:border-slate-700 dark:hover:border-white flex items-center justify-center text-slate-400 hover:text-slate-800 dark:hover:text-white transition-all cursor-pointer">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>

      <form id="card-creation-form" class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div class="space-y-1.5">
            <label class="text-base font-black text-slate-500 dark:text-slate-400">작성자 닉네임</label>
            <input type="text" id="card-author" placeholder="익명" class="w-full bg-slate-50 dark:bg-slate-950 border-2 border-slate-200 dark:border-slate-800 rounded-xl px-3 py-2 text-base font-bold text-slate-800 dark:text-white focus:outline-none">
          </div>
          <div class="space-y-1.5">
            <label class="text-base font-black text-slate-500 dark:text-slate-400">카드 테마 색상</label>
            <!-- Custom Pastel Selector -->
            <div class="flex gap-1.5 items-center h-8">
              <label class="cursor-pointer">
                <input type="radio" name="color-picker" value="bg-pastel-pink" checked class="hidden peer">
                <span class="w-6 h-6 rounded-full bg-pastel-pink border-2 border-rose-300 block peer-checked:scale-125 peer-checked:ring-2 peer-checked:ring-slate-900 dark:peer-checked:ring-white transition-all"></span>
              </label>
              <label class="cursor-pointer">
                <input type="radio" name="color-picker" value="bg-pastel-yellow" class="hidden peer">
                <span class="w-6 h-6 rounded-full bg-pastel-yellow border-2 border-amber-300 block peer-checked:scale-125 peer-checked:ring-2 peer-checked:ring-slate-900 dark:peer-checked:ring-white transition-all"></span>
              </label>
              <label class="cursor-pointer">
                <input type="radio" name="color-picker" value="bg-pastel-blue" class="hidden peer">
                <span class="w-6 h-6 rounded-full bg-pastel-blue border-2 border-sky-300 block peer-checked:scale-125 peer-checked:ring-2 peer-checked:ring-slate-900 dark:peer-checked:ring-white transition-all"></span>
              </label>
              <label class="cursor-pointer">
                <input type="radio" name="color-picker" value="bg-pastel-green" class="hidden peer">
                <span class="w-6 h-6 rounded-full bg-pastel-green border-2 border-emerald-300 block peer-checked:scale-125 peer-checked:ring-2 peer-checked:ring-slate-900 dark:peer-checked:ring-white transition-all"></span>
              </label>
              <label class="cursor-pointer">
                <input type="radio" name="color-picker" value="bg-pastel-purple" class="hidden peer">
                <span class="w-6 h-6 rounded-full bg-pastel-purple border-2 border-violet-300 block peer-checked:scale-125 peer-checked:ring-2 peer-checked:ring-slate-900 dark:peer-checked:ring-white transition-all"></span>
              </label>
            </div>
          </div>
        </div>

        <div class="space-y-1.5">
          <label class="text-base font-black text-slate-500 dark:text-slate-400">제목</label>
          <input type="text" id="card-title" placeholder="카드의 간단한 한 줄 제목을 적어주세요." class="w-full bg-slate-50 dark:bg-slate-950 border-2 border-slate-200 dark:border-slate-800 rounded-xl px-3 py-2 text-base font-bold text-slate-800 dark:text-white focus:outline-none">
        </div>

        <div class="space-y-1.5">
          <label class="text-base font-black text-slate-500 dark:text-slate-400">내용 (메시지)</label>
          <textarea id="card-content" rows="4" required placeholder="공유하고 싶은 의견이나 재미있는 이야기를 마음껏 서술해주세요." class="w-full bg-slate-50 dark:bg-slate-950 border-2 border-slate-200 dark:border-slate-800 rounded-xl px-3 py-2 text-base font-bold text-slate-800 dark:text-white focus:outline-none resize-none"></textarea>
        </div>

        <!-- URL Link Preview Box in Modal -->
        <div id="link-preview-box" class="hidden border-2 border-violet-200 dark:border-slate-800 rounded-xl p-3 bg-slate-50 dark:bg-slate-950 space-y-2 relative">
          <button type="button" id="btn-remove-link-preview" class="absolute top-2 right-2 w-7 h-7 rounded-full bg-black/60 text-white flex items-center justify-center hover:bg-black/80 transition-colors cursor-pointer z-10">
            <i data-lucide="x" class="w-3.5 h-3.5"></i>
          </button>
          <div class="flex gap-3">
            <div id="link-preview-image-container" class="w-20 h-20 bg-slate-200 rounded-lg overflow-hidden flex-shrink-0 hidden">
              <img id="link-preview-img" src="" class="w-full h-full object-cover" alt="Link preview">
            </div>
            <div class="space-y-1 min-w-0 flex-grow">
              <h4 id="link-preview-title" class="text-sm font-black text-slate-900 dark:text-white truncate"></h4>
              <p id="link-preview-desc" class="text-xs text-slate-500 dark:text-slate-400 line-clamp-2 leading-relaxed"></p>
              <span id="link-preview-url" class="text-[10px] text-clay-sky truncate block"></span>
            </div>
          </div>
        </div>

        <div class="space-y-1.5">
          <label class="text-base font-black text-slate-500 dark:text-slate-400">이미지 첨부 또는 유튜브 링크 (선택사항)</label>
          
          <!-- Image preview element -->
          <div id="modal-image-preview-container" class="hidden relative w-full h-32 rounded-xl overflow-hidden border-2 border-dashed border-violet-200 dark:border-slate-800 mb-2 flex items-center justify-center bg-slate-50 dark:bg-slate-950">
            <img id="modal-image-preview" class="h-full object-contain" src="" alt="preview">
            <button type="button" id="btn-remove-preview-img" class="absolute top-2 right-2 w-7 h-7 rounded-full bg-black/60 text-white flex items-center justify-center hover:bg-black/80 transition-colors cursor-pointer">
              <i data-lucide="x" class="w-3.5 h-3.5"></i>
            </button>
          </div>

          <div class="flex gap-2">
            <input type="text" id="card-image-url" placeholder="유튜브 주소 또는 웹 이미지 URL" class="w-full bg-slate-50 dark:bg-slate-950 border-2 border-slate-200 dark:border-slate-800 rounded-xl px-3 py-2 text-base font-bold text-slate-800 dark:text-white focus:outline-none">
            
            <input type="file" id="card-image-file" accept="image/*" class="hidden">
            <button type="button" onclick="document.getElementById('card-image-file').click()" class="btn px-4 py-2 text-xs font-black border-2 border-slate-200 dark:border-slate-800 rounded-xl bg-slate-50 dark:bg-slate-900 hover:bg-slate-100 flex items-center gap-1.5 cursor-pointer whitespace-nowrap">
              <i data-lucide="camera" class="w-4 h-4 text-clay-purple"></i>
              <span>사진 올리기</span>
            </button>
          </div>
          <p class="text-[10px] font-bold text-slate-400 dark:text-slate-500 mt-1">💡 캡처한 이미지를 모달 창에서 <b>Ctrl + V</b>로 붙여넣거나 <b>[사진 올리기]</b> 버튼을 사용해 직접 업로드할 수 있습니다. (초경량 자동 압축 저장)</p>
        </div>

        <div class="space-y-1.5">
          <label class="text-base font-black text-slate-500 dark:text-slate-400">문서 첨부 (한글 HWP, PDF 등 - 선택사항)</label>
          <div class="flex gap-2">
            <input type="file" id="card-attachment-file" class="hidden">
            <button type="button" onclick="document.getElementById('card-attachment-file').click()" class="btn px-4 py-2.5 text-xs font-black border-2 border-slate-200 dark:border-slate-800 rounded-xl bg-white dark:bg-slate-900 hover:bg-slate-50 flex items-center gap-1.5 cursor-pointer">
              <i data-lucide="file-text" class="w-4 h-4 text-clay-purple"></i>
              <span>파일 선택...</span>
            </button>
            <div id="attachment-status" class="text-xs font-bold text-slate-400 self-center truncate max-w-[200px]">선택된 파일 없음</div>
            <button type="button" id="btn-remove-attachment" onclick="removeAttachmentFile()" class="hidden w-7 h-7 rounded-full bg-rose-500 text-white flex items-center justify-center hover:bg-rose-600 transition-colors cursor-pointer self-center">
              <i data-lucide="x" class="w-3.5 h-3.5"></i>
            </button>
          </div>
          <input type="hidden" id="card-attachment-name">
          <input type="hidden" id="card-attachment-data">
        </div>

        <!-- Admin Notice Pinning Checkbox -->
        <div id="admin-notice-checkbox-container" class="hidden pb-2">
          <label class="inline-flex items-center gap-2 cursor-pointer p-1">
            <input type="checkbox" id="card-is-notice" class="w-4.5 h-4.5 text-clay-purple border-2 border-slate-300 dark:border-slate-700 rounded-lg focus:ring-clay-purple focus:ring-2 cursor-pointer accent-violet-600">
            <span class="text-xs font-black text-slate-700 dark:text-slate-200 flex items-center gap-1 select-none">📌 공지사항으로 최상단 고정 (관리자 전용)</span>
          </label>
        </div>

        <button type="submit" class="w-full btn py-4 text-base font-black border-2 border-slate-900 dark:border-white rounded-2xl bg-clay-purple text-white hover:bg-violet-600 shadow-clay-flat transition-all cursor-pointer flex items-center justify-center gap-1.5">
          <i data-lucide="check-circle" class="w-5 h-5"></i>
          <span>포스트 보드에 부착하기</span>
        </button>
      </form>
    </div>
  </div>

  <!-- 5. Card Detail Modal Dialog -->
  <div id="card-detail-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white dark:bg-clay-cardDark border-4 border-violet-200 dark:border-slate-800 rounded-3xl max-w-2xl w-full p-6 shadow-clay-flat-lg transform transition-all duration-300 scale-95 opacity-0 text-left flex flex-col max-h-[90vh]" id="card-detail-modal-content">
      <!-- Modal Header -->
      <div class="flex justify-between items-center border-b-2 border-slate-100 dark:border-slate-800 pb-3 mb-4 flex-shrink-0">
        <div class="flex items-center gap-2">
          <span id="detail-author-badge" class="px-3 py-1 rounded-full bg-violet-100 dark:bg-violet-950/50 border border-violet-300 dark:border-violet-700 text-xs font-black text-violet-700 dark:text-violet-400">👑 작성자</span>
          <span id="detail-date" class="text-xs font-bold text-slate-400 dark:text-slate-500">날짜</span>
        </div>
        <button id="btn-close-detail-modal" class="w-8 h-8 rounded-lg border-2 border-slate-300 hover:border-slate-900 dark:border-slate-700 dark:hover:border-white flex items-center justify-center text-slate-400 hover:text-slate-800 dark:hover:text-white transition-all cursor-pointer">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>

      <!-- Modal Body (Scrollable) -->
      <div class="overflow-y-auto space-y-4 pr-1 flex-grow custom-scrollbar">
        <!-- Detail Image Container -->
        <div id="detail-image-container" class="hidden w-full rounded-2xl overflow-hidden border-2 border-slate-950/15 dark:border-white/10 bg-slate-50 dark:bg-slate-950">
          <!-- Will hold img or iframe -->
        </div>

        <!-- Detail Title -->
        <h2 id="detail-title" class="text-xl font-black text-slate-900 dark:text-white break-words">제목</h2>

        <!-- Detail Content -->
        <p id="detail-content" class="text-base font-medium leading-relaxed whitespace-pre-wrap break-words text-slate-700 dark:text-slate-300">내용</p>

        <!-- Comments Section inside detail modal -->
        <div class="border-t-2 border-dashed border-slate-100 dark:border-slate-800 pt-4 mt-6">
          <h3 class="text-sm font-black text-slate-850 dark:text-slate-200 mb-3 flex items-center gap-1.5">
            <i data-lucide="message-square" class="w-4 h-4 text-clay-purple"></i> 실시간 댓글 토론 (<span id="detail-comments-count">0</span>)
          </h3>
          <div id="detail-comments-list" class="space-y-2.5 max-h-60 overflow-y-auto pr-1 custom-scrollbar">
            <!-- Dynamic comments go here -->
          </div>
          
          <!-- Add Comment Form -->
          <div class="flex gap-2 mt-4 bg-slate-50 dark:bg-slate-900 p-2.5 rounded-2xl border-2 border-slate-950/10 dark:border-white/10">
            <input type="text" id="detail-comment-author" placeholder="이름" class="w-20 bg-white dark:bg-slate-950 border-2 border-slate-200 dark:border-slate-800 rounded-xl px-3 py-2 text-xs font-black focus:outline-none">
            <input type="text" id="detail-comment-text" placeholder="토론 의견을 입력하세요..." class="w-full bg-white dark:bg-slate-950 border-2 border-slate-200 dark:border-slate-800 rounded-xl px-3 py-2 text-xs font-bold focus:outline-none">
            <button id="detail-comment-submit-btn" class="px-4 py-2 bg-clay-purple text-white rounded-xl text-xs font-black hover:bg-violet-600 transition-colors cursor-pointer whitespace-nowrap">등록</button>
          </div>
        </div>
      </div>
      
      <!-- Modal Footer -->
      <div class="border-t-2 border-slate-100 dark:border-slate-800 pt-3 mt-4 flex justify-between items-center flex-shrink-0">
        <div class="flex gap-2">
          <button id="detail-like-btn" class="px-3 py-2 rounded-xl bg-slate-50 hover:bg-slate-100 dark:bg-slate-900 dark:hover:bg-slate-800 text-xs font-black border border-slate-950/10 dark:border-white/10 flex items-center gap-1.5 cursor-pointer transition-all hover:scale-105 active:scale-95">
            <i data-lucide="heart" class="w-4 h-4 text-rose-500 fill-rose-500"></i>
            <span id="detail-likes-count">0</span>
          </button>
        </div>
        <button id="btn-close-detail-modal-bottom" class="px-5 py-2.5 text-xs font-black border-2 border-slate-900 dark:border-white rounded-xl bg-slate-900 dark:bg-white text-white dark:text-slate-900 hover:opacity-85 shadow-clay-flat-sm transition-all cursor-pointer">
          닫기
        </button>
      </div>
  </div>

  <!-- 6. Fullscreen Image Lightbox -->
  <div id="image-lightbox" class="hidden fixed inset-0 bg-black/95 z-[60] flex items-center justify-center cursor-zoom-out">
    <button id="btn-close-lightbox" class="absolute top-6 right-6 w-12 h-12 rounded-full bg-white/10 hover:bg-white/20 text-white flex items-center justify-center transition-all cursor-pointer">
      <i data-lucide="x" class="w-6 h-6"></i>
    </button>
    <img id="lightbox-img" src="" alt="Fullscreen view" class="max-w-full max-h-full object-contain p-4 select-none transform transition-all duration-300 scale-95 opacity-0">
  </div>

  <!-- App Custom Script -->
  <script src="/js/wall.js?v=1.0.8"></script>
  <script>
    window.addEventListener('load', () => {
      if (window.lucide) {
        window.lucide.createIcons();
      }
    });
    // Fallback timer just in case of delayed load
    setTimeout(() => {
      if (window.lucide) window.lucide.createIcons();
    }, 1000);
  </script>
</body>
</html>
